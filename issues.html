<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main issue Trackea page </title>
     <!-- daisy uI and Tailwind css  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

    <!-- font CDN -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- Tailwind + DaisyUI CDN (correct) --> 
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    plugins: [daisyui],
  }
</script>
     <!-- add css -->
      <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing:border-box ;
           
        }

        body{
           background-color: #FBFAFC; 
        }
      </style>
  
</head>
    <body>


      <!-- navbar section -->
        <header class="w-11/12 mx-auto">

        <div class="navbar bg-base-100 shadow-lg px-4 md:px-8 flex flex-wrap md:flex-nowrap justify-between items-center ">
  <div class="navbar-start">
    <div class="dropdown ">
      <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
      </div>
      
    </div>
   <div class="flex gap-5">

    <img src="./assets/github-logo.png" alt="" class="w-8">
    <a class="font-semibold text-2xl btn  btn-ghost ">gitHub Issues Tracker</a>
    </div>
  </div> 
  

  
  <div class="navbar-end flex flex-col md:flex-row items-center gap-6 md:gap-4 w-full md:w-auto mt-2 md:mt-0 ">

<label class="input  border-2 border-gray-200 rounded-lg flex items-center px-2 w-full md:w-auto">
  <svg class="h-[1em] opacity-50 " xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="searchInput" type="search" required placeholder="Search issues..." />
</label>
<button onclick="searchIssues()" class="btn bg-[#4A00FF] text-white  px-4 md:px-6 py-2 md:py-3 text-sm md:text-lg w-full md:w-auto ">
+ New Issue
</button>


    <!-- <a class="btn bg-[#4A00FF] text-white px-4 md:px-6 py-2 md:py-3 text-sm md:text-lg w-full md:w-auto  "></a> -->
  </div>
</div>



</header>

<!-- main section -->

<main>
  <section class="w-10/12 mx-auto  mt-6 shadow-md bg-[#FFFFFF]  ">
    <div class="flex flex-wrap gap-4 border p-6 mb-6 space-x-10 rounded-md">
      <button id="allBtn"  onclick="loadIssues()"  class="btn bg-[#4A00FF] text-white px-4 md:px-6 py-2 md:py-3 text-sm md:text-lg ">All</button>
      <button id="openBtn" onclick="loadOpenIssues()" class="btn px-4 md:px-6 py-2 md:py-3 text-sm md:text-lg">Open</button>
      <button id="closedBtn" onclick="loadClosedIssues()"  class="btn px-4 md:px-6 py-2 md:py-3 text-sm md:text-lg">Closed</button>
    </div>
  </section>

  <section class="w-10/12 mx-auto mt-4 shadow-md bg-white p-6 rounded-md">

    <div class="flex flex-col md:flex-row justify-between items-center ">

      <div class="flex items-center gap-3">
     
       <img src="./assets/Aperture.png" alt="" class="bg-[#ECE4FF] p-2 rounded-full ">

      <div>
        <span class="font-semibold text-lg"><span id="totalIssues">0</span> Issues
</span>
        <p class="text-gray-500 text-sm">
          Track and manage your project issues
        </p>
      </div>
    </div>


 <div class="flex items-center gap-4 mt-4 md:mt-0">

      <span class="flex items-center gap-2 font-medium">
        <i class="fa-solid fa-circle  text-green-500 text-xs "></i>
        Open   <span id="openCount">0</span>
      </span>

      <span class="flex items-center gap-2  font-medium">
        <i class="fa-solid fa-circle text-purple-500 text-xs"></i>
        Closed  <span id="closedCount">0</span> 
      </span>


    </div>
    </div>

  </section>

  <!-- issue card section -->

  <section class="w-10/12 mx-auto mt-4 ">
    <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
     

    </div>
  </section>


 

</main>

<script src="issues.js"></script>
 
    
</body>
</html>
